<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Industry | AI Prediction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-brand"><span class="nav-icon">♻️</span><span class="nav-title">PlasticAudit</span><span
                class="nav-sdg">SDG 12 &amp; 14</span></div>
        <ul class="nav-links">
            <li><a th:href="@{/dashboard}">Dashboard</a></li>
            <li><a th:href="@{/waste/list}">Waste Entries</a></li>
            <li><a th:href="@{/reports}">Reports</a></li>
            <li><a th:href="@{/prediction}" class="active">🤖 AI Predict</a></li>
            <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/industries}">Admin</a></li>
        </ul>
        <div class="nav-user">
            <span class="user-badge" sec:authorize="hasRole('ADMIN')">ADMIN</span>
            <span sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-logout">Logout</a>
        </div>
    </nav>
    <main class="container">
        <div class="page-header">
            <div>
                <h1 class="page-title">🤖 AI Waste Prediction</h1>
                <p class="page-subtitle">Select an industry to view predictions and trend analysis</p>
            </div>
        </div>
        <div class="metrics-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
            <div th:each="ind : ${industries}" class="metric-card" style="cursor:pointer; text-decoration:none;">
                <a th:href="@{/prediction/{id}(id=${ind.id})}"
                    style="text-decoration:none; color:inherit; display:block;">
                    <div class="metric-icon">🏭</div>
                    <div class="metric-value" style="font-size:1.1rem;" th:text="${ind.name}">-</div>
                    <div class="metric-label" th:text="${ind.sector ?: 'General'}">-</div>
                    <div class="metric-sub" th:text="${ind.location ?: ''}">-</div>
                    <div style="margin-top:0.75rem;" class="badge badge-reduction">View Prediction →</div>
                </a>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(industries)}" class="empty-state">
            <p>No industries registered yet. <a th:href="@{/admin/industries}">Add an industry →</a></p>
        </div>
    </main>
    <footer class="footer">
        <p>♻️ PlasticAudit — SDG 12 &amp; 14</p>
    </footer>
    <script th:src="@{/js/app.js}"></script>
</body>

</html>
