# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://dpg-d832583eo5us73duvoig-a/plastic_waste_db
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=plastic_waste_db_user
spring.datasource.password=zI1BNzy4pG9YDoyXf4BIyClB07pkpKfI

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA / Hibernate 6.x (CO3)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Initialize Schema
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.plasticaudit=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/plastic-waste-tracker.log

# Async Thread Pool (Multithreading - CO1)
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ReportAggregator-

# Alert Socket Server Port (CO4)
alert.socket.port=9090
alert.socket.enabled=true

# Application Name
spring.application.name=plastic-waste-tracker
